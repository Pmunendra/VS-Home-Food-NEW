<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — VS Home Food </title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#1A1A1A;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-card{background:#fff;border-radius:20px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 40px 80px rgba(0,0,0,0.4);}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{font-size:48px;display:block;margin-bottom:8px;}
.logo-name{font-size:24px;font-weight:700;color:#E8471A;}
.logo-sub{font-size:13px;color:#888;margin-top:4px;}
h2{font-size:22px;font-weight:700;margin-bottom:8px;text-align:center;color:#1A1A1A;}
p.sub{color:#888;font-size:14px;text-align:center;margin-bottom:28px;}
.form-group{margin-bottom:20px;}
label{font-size:13px;font-weight:600;color:#4A4A4A;display:block;margin-bottom:8px;}
input[type=password]{width:100%;padding:12px 16px;border:2px solid #E8D5C0;border-radius:10px;font-size:15px;font-family:inherit;transition:border 0.2s;}
input:focus{outline:none;border-color:#E8471A;}
.btn{width:100%;padding:14px;background:#E8471A;color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background 0.2s;}
.btn:hover{background:#C93A12;}
#msg{display:none;padding:12px 16px;border-radius:8px;margin-bottom:16px;font-size:14px;}
.error{background:#FEE2E2;color:#991B1B;}
.back-link{display:block;text-align:center;margin-top:20px;font-size:13px;color:#888;text-decoration:none;}
.back-link:hover{color:#E8471A;}
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VS Home Foods" class="logo-icon" style="height:64px;width:auto;object-fit:contain;display:block;margin:0 auto 8px;">
        <div class="logo-name">VS Home Food </div>
        <div class="logo-sub">Admin Dashboard</div>
    </div>
    <h2>Admin Login</h2>
    <p class="sub">Enter admin password to continue</p>
    <div id="msg"></div>
    <div class="form-group">
        <label>Admin Password</label>
        <input type="password" id="adminPwd" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn" onclick="doLogin()">Login to Dashboard →</button>
    <a href="/" class="back-link">← Back to website</a>
</div>
<script>
async function doLogin() {
    const pwd = document.getElementById('adminPwd').value;
    const msg = document.getElementById('msg');
    if (!pwd) { showMsg('Enter password', true); return; }
    try {
        const res  = await fetch('/admin/login', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({password: pwd})
        });
        const data = await res.json();
        if (data.success) { window.location.href = '/admin/dashboard'; }
        else { showMsg(data.message || 'Invalid password', true); }
    } catch(e) { showMsg('Error. Try again.', true); }
}
function showMsg(text, err) {
    const el = document.getElementById('msg');
    el.textContent    = text;
    el.className      = err ? 'error' : '';
    el.style.display  = 'block';
}
</script>
</body>
</html>
