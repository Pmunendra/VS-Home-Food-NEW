{% extends 'base.html' %}
{% block title %}Login — VS Home Food{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo"> <img src="{{ url_for('static', filename='images/logo.png') }}" alt="VS Home Foods" class="nav-logo-img"></div>
            <h2>Welcome Back!</h2>
            <p>Sign in to your VS Home Food account</p>
        </div>
        <div class="auth-form">
            <div id="login-msg" style="display:none; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px;"></div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input">
                    <input type="password" id="loginPassword" placeholder="Your password">
                    <button type="button" onclick="togglePassword('loginPassword')">👁️</button>
                </div>
            </div>
            <div class="auth-options">
                <label class="checkbox-label">
                    <input type="checkbox"> Remember me
                </label>
                <a href="#" class="forgot-link">Forgot Password?</a>
            </div>
            <button class="btn-primary full-width" id="loginBtn" onclick="handleLogin()">Login →</button>
            <div class="auth-divider"><span>or</span></div>
            <button class="btn-google full-width">🔍 Continue with Google</button>
            <p class="auth-switch">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleLogin() {
    const btn      = document.getElementById('loginBtn');
    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
        showMsg('⚠️ Please Email and Password.', 'error');
        return;
    }

    btn.disabled    = true;
    btn.textContent = 'Logging in...';

    try {
        const res = await fetch('/api/auth/login', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (data.success) {
            showMsg('✅ ' + data.message, 'success');
            setTimeout(() => window.location.href = '/', 1500);
        } else {
            showMsg('❌ ' + data.message, 'error');
            btn.disabled    = false;
            btn.textContent = 'Login →';
        }
    } catch (err) {
        showMsg('❌ Server error. Try again.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Login →';
    }
}

function showMsg(text, type) {
    const el            = document.getElementById('login-msg');
    el.style.display    = 'block';
    el.textContent      = text;
    el.style.background = type === 'success' ? '#D1FAE5' : '#FEE2E2';
    el.style.color      = type === 'success' ? '#065F46'  : '#991B1B';
}

function togglePassword(id) {
    const input = document.getElementById(id);
    input.type  = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
