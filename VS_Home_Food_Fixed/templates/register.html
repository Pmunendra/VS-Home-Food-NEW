{% extends 'base.html' %}
{% block title %}Register — VS Home Food{% endblock %}

{% block content %}
<div class="auth-page">
    <div class="auth-card wide">
        <div class="auth-header">
            <div class="auth-logo"><img src="{{ url_for('static', filename='images/logo.png') }}" alt="VS Home Foods" class="auth-logo" style="height:60px;width:auto;object-fit:contain;display:block;margin-bottom:6px;"></div>
            <h2>Create Account</h2>
            <p>Join the VS Home Food family today!</p>
        </div>
        <div class="auth-form">
            <div id="register-msg" style="display:none; padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:14px;"></div>
            <div class="form-grid two-col">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="firstName" placeholder="First name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="lastName" placeholder="Last name">
                </div>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="regPhone" placeholder="+91 9876543210">
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-input">
                    <input type="password" id="regPassword" placeholder="Min 8 characters">
                    <button type="button" onclick="togglePassword('regPassword')">👁️</button>
                </div>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="regConfirm" placeholder="Confirm your password">
            </div>
            <label class="checkbox-label">
                <input type="checkbox" id="termsCheck"> I agree to the <a href="#">Terms & Conditions</a>
            </label>
            <button class="btn-primary full-width" id="registerBtn" onclick="handleRegister()">
                Create Account →
            </button>
            <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
async function handleRegister() {
    const btn = document.getElementById('registerBtn');
    const msg = document.getElementById('register-msg');

    const firstName       = document.getElementById('firstName').value.trim();
    const lastName        = document.getElementById('lastName').value.trim();
    const email           = document.getElementById('regEmail').value.trim();
    const phone           = document.getElementById('regPhone').value.trim();
    const password        = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirm').value;
    const terms           = document.getElementById('termsCheck').checked;

    // Basic validation
    if (!firstName || !lastName || !email || !phone || !password) {
        showMsg('⚠️  Fill A All Fields.', 'error'); return;
    }
    if (password.length < 8) {
        showMsg('⚠️ Password minimum 8 characters.', 'error'); return;
    }
    if (password !== confirmPassword) {
        showMsg('⚠️ Not match a Passwords.', 'error'); return;
    }
    if (!terms) {
        showMsg('⚠️ please accept a Terms & Conditions.', 'error'); return;
    }

    btn.disabled     = true;
    btn.textContent  = 'Creating Account...';

    try {
        const res = await fetch('/api/auth/register', {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ firstName, lastName, email, phone, password, confirmPassword })
        });
        const data = await res.json();

        if (data.success) {
            showMsg('✅ ' + data.message + ' — Check your email for welcome message!', 'success');
            setTimeout(() => window.location.href = '/', 2000);
        } else {
            showMsg('❌ ' + data.message, 'error');
            btn.disabled    = false;
            btn.textContent = 'Create Account →';
        }
    } catch (err) {
        showMsg('❌ Server error. Try again.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Create Account →';
    }
}

function showMsg(text, type) {
    const el = document.getElementById('register-msg');
    el.style.display    = 'block';
    el.textContent      = text;
    el.style.background = type === 'success' ? '#D1FAE5' : '#FEE2E2';
    el.style.color      = type === 'success' ? '#065F46'  : '#991B1B';
}

function togglePassword(id) {
    const input  = document.getElementById(id);
    input.type   = input.type === 'password' ? 'text' : 'password';
}
</script>
{% endblock %}
